##### ===========================
#####  CONFIG GLOBAL / QUALITY
##### ===========================
set -g base-index 1 # start windows numbering at 1
set -g default-terminal "screen-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"   # True color
set -g history-limit 200000                               # histórico gigante

set -g mouse on                                            # mouse completo
set -g renumber-windows on                                 # renumera janelas automaticamente

##### ===========================
#####  PREFIXO ALTERNATIVO (OPCIONAL)
##### ===========================
# prefixo mais confortável: Ctrl + a
unbind C-b
set-option -g prefix C-a
bind C-a send-prefix


##### ===========================
##### NAVEGAÇÃO (VIM-LIKE)
##### ===========================
setw -g mode-keys vi    # navegação no mode copy
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Troca de janelas via vim-style
bind -r H previous-window
bind -r L next-window


##### ===========================
##### SPLITS INTELIGENTES
##### ===========================
# Splits rápidos (| e -)
bind | split-window -h
bind - split-window -v

# Splits que começam no diretório atual
bind-key s split-window -v -c "#{pane_current_path}"
bind-key v split-window -h -c "#{pane_current_path}"

# Maximizar/Restaurar painel
bind z resize-pane -Z


##### ===========================
##### RESIZE RÁPIDO
##### ===========================
bind -r < resize-pane -L 5
bind -r > resize-pane -R 5
bind -r + resize-pane -U 5
bind -r - resize-pane -D 5


##### ===========================
##### COPY MODE PRO (Sistema + Vim)
##### ===========================
# Copiar para clipboard no Linux (xclip) ou macOS (pbcopy)
set-option -s set-clipboard on

bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy 2>/dev/null || xclip -sel clip"


##### ===========================
##### ATALHOS DE CONVENIÊNCIA
##### ===========================
bind r source-file ~/.tmux.conf \; display-message "✔ Config recarregada!"
bind e new-window -n "editor" "nvim"
bind g new-window -n "git" "lazygit"
bind t new-window -n "todo" "taskwarrior-tui || htop"


##### ===========================
##### STATUS BAR / TEMA
##### ===========================
set -g status-interval 1
set -g status-justify centre

# Cores
set -g status-bg colour234
set -g status-fg colour248

# Estilo da barra
set -g status-left-length 60
set -g status-right-length 120

##### STATUS LEFT (sessão + janela)
set -g status-left "#[fg=colour46]● #[fg=white]#S #[fg=colour240]|"

##### STATUS RIGHT (hora + git)
set -g status-right "#[fg=colour240]#(whoami) #[fg=colour240]| #[fg=colour39]%H:%M:%S #[fg=colour240]| #(git -C #{pane_current_path} rev-parse --abbrev-ref HEAD 2>/dev/null || echo '-') "

##### ===========================
#####  PLUGINS (TPM)
##### ===========================
# Instale TPM antes: https://github.com/tmux-plugins/tpm

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# Auto-save + auto-restore sessões
set -g @continuum-restore 'on'


bind -n C-F1 run-shell "tmux source-file ~/.tmux/themes/dracula.conf"
bind -n C-F2 run-shell "tmux source-file ~/.tmux/themes/gruvbox.conf"
bind -n C-F3 run-shell "tmux source-file ~/.tmux/themes/nord.conf"
bind -n C-F4 run-shell "tmux source-file ~/.tmux/themes/solarized-light.conf"
bind -n C-F5 run-shell "tmux source-file ~/.tmux/themes/onedark.conf"


run '~/.tmux/plugins/tpm/tpm'

