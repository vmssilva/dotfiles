##### ===========================
#####        THEME DARK
##### ===========================

# True color
set -g default-terminal "screen-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

##### COLORS
set -g status-bg "colour234"
set -g status-fg "colour250"

# Accent colors
set -g @accent1 "colour39"
set -g @accent2 "colour141"

##### STATUS BAR
set -g status-justify centre
set -g status-left-length 60
set -g status-right-length 120

##### LEFT SIDE
set -g status-left "#[fg=colour39]● #[fg=colour250]#S #[fg=colour240]|"

##### RIGHT SIDE
set -g status-right "#[fg=colour141]#(whoami) #[fg=colour240]| #[fg=colour39]%H:%M:%S #[fg=colour240]| #[fg=colour141]#(git -C #{pane_current_path} rev-parse --abbrev-ref HEAD 2>/dev/null || echo '-')"

##### WINDOW STYLE
setw -g window-status-current-format "#[fg=colour39]#I:#W#[fg=colour250]"
setw -g window-status-format "#[fg=colour250]#I:#W"
setw -g window-status-current-style "bold"
